name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy bandit pydantic
      - name: Lint (skip if no Python files yet)
        run: |
          if find src/ web/ codegen/ scripts/ -name "*.py" 2>/dev/null | grep -q .; then
            ruff check src/ web/ codegen/ scripts/ --ignore E501
            mypy src/ web/ codegen/ --ignore-missing-imports
            bandit -r src/ web/ -q
          else
            echo "No Python files yet, skipping lint"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Test (skip if no test files yet)
        run: |
          if find tests/ -name "test_*.py" 2>/dev/null | grep -q .; then
            pytest tests/ -m "not integration and not eval" -v --tb=short
          else
            echo "No tests yet, skipping"
          fi
