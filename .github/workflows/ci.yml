name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy bandit pydantic textx
      - run: pip install -e . --no-deps -q
      - run: ruff check src/ web/ codegen/ scripts/
      - run: mypy src/ web/ codegen/ --ignore-missing-imports
      - run: bandit -r src/ web/ -q

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install -e . --no-deps -q
      - name: Run tests with coverage
        run: |
          pytest tests/ -m "not integration and not eval" \
            --cov=src --cov-report=term-missing --cov-report=xml \
            -v --tb=short
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
