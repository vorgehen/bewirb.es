# Technology Taxonomy — Stufe 1 (handgefertigt)
#
# Zweck:
#   - Normalisierung: aliases erlauben Matching trotz unterschiedlicher Schreibweisen
#   - SFIA-Level-Schätzung: Jahre → Schätzung auf SFIA 1-7 Skala
#                           (1=Follow, 2=Assist, 3=Apply, 4=Enable, 5=Ensure/Advise,
#                            6=Initiate/Influence, 7=Set Strategy)
#   - Kategorisierung für die Schlüsselkompetenz-Ableitung in pim_to_psm
#
# Quellen: handverlesen aus Roberts Erfahrungsraum (kein ESCO/SFIA-Compliance-Anspruch).
# Erweiterung: weitere Stufen siehe Plan / Ideen-Kapitel.

technologies:

