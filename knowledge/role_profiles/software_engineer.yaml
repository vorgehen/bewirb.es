# Role Profile: Software Engineer
#
# Referenz-Kompetenzset für die Rolle "Software Engineer" — die Rolle für die
# Robert sich derzeit bewirbt. Bewusst breiter Korridor (SFIA 3-5), weil
# "Software Engineer" als Titel in unterschiedlichen Unternehmen sehr verschiedene
# Senioritätsstufen abdeckt — vom Mid-Level-Generalisten bis zum erfahrenen
# Senior-Practitioner ohne explizites Architektur-Mandat.
#
# Verwendung in Advisory:
#   - Hauptzielrolle für Modus 1 (Einzel-Bewerbungsempfehlung) und Modus 2 (Portfolio-Scan)
#   - Modus 3 (Marktpositionierung): Vergleich mit senior_architect zeigt Über-/Unter-Senioritäten
#
# Differenzierung zu senior_architect:
#   - Software Engineer baut, testet, implementiert; nimmt an Design teil
#   - Senior Architect verantwortet Architektur explizit, dokumentiert ARC42, trifft langlebige
#     Entscheidungen
#
# Quelle: handverlesen, Stufe 1.

role: Software Engineer
sfia_level: 4
sfia_target_range: [3, 5]

description: >-
  Entwickelt, testet und liefert Software-Funktionalität gegen fachliche Anforderungen.
  Arbeitet im Scrum/Kanban-Team, ist verantwortlich für die Qualität des eigenen Codes
  und beteiligt sich an Design-Entscheidungen im Team. Senior-Ausprägungen übernehmen
  zusätzlich Code-Reviews, Mentoring und Schnittstellen-Modellierung.

expected_competencies:

  methodenkompetenz:
    erwartet:
      - Test-Driven Development (oder gleichwertige Test-Disziplin)
      - Clean Code
      - Code Reviews (geben und nehmen)
      - Iteratives Vorgehen (Scrum, Kanban oder vergleichbar)
      - Versionskontrolle mit Git
    wuenschenswert:
      - Refactoring-Patterns
      - Pair Programming
      - Domain-Driven Design (Basics)

  fachkompetenz:
    erwartet:
      - Fähigkeit, fachliche Anforderungen zu verstehen und Rückfragen zu stellen
      - Zusammenarbeit mit Business Analysts / Product Ownern
    wuenschenswert:
      - Vorerfahrung in der Branche des Auftraggebers
      - Tiefe in mindestens einer Domäne (z.B. Finanzwesen, Telco, Public Sector)

  technologie:
    erwartet_eines_von:
      - [Java, Spring Framework]
      - [Java, Spring Boot]
      - [Java, JEE]
      - [Java, Quarkus]
    erwartet:
      - Mindestens eine relationale Datenbank (Oracle, PostgreSQL, MS SQL Server)
      - REST APIs
      - Versionskontrolle (Git)
      - Continuous Integration (Jenkins, GitLab CI oder vergleichbar)
    wuenschenswert:
      - JPA / Hibernate
      - GraphQL
      - Messaging (Kafka, JMS, RabbitMQ)
      - Container (Docker)
      - Cloud-Plattform (AWS, Azure oder GCP — mind. Grundkenntnisse)

  spezialgebiet:
    optional_aber_differenzierend:
      - Modellgetriebene Entwicklung mit Xtext / openArchitectureware
      - Domain-Specific Languages
      - Legacy-Modernisierung und Migrations-Projekte
      - Performance-Optimierung
      - AI Software Engineering (für vorausschauende Positionen)

  fuehrungkompetenz:
    erwartet:
      - Teamfähigkeit
      - Eigenverantwortliche Bearbeitung von User Stories
      - Verständliche schriftliche und mündliche Kommunikation
    senior_zusaetzlich:
      - Mentoring junior Entwickler
      - Code-Review-Qualität als Multiplikator
      - Schnittstellen-Modellierung im Team

# ─── Abgrenzung ──────────────────────────────────────────────────────────────

abgrenzung:
  - "Nicht: Junior-Position (das wäre SFIA 1-2)"
  - "Nicht: Solution Architect oder Senior Software Architect (das ist senior_architect.yaml)"
  - "Nicht: Engineering Manager (Personalverantwortung, anderes Profil)"
  - >-
    Das Besondere bei Robert: Bewirbt sich als Software Engineer, bringt aber faktisch
    Senior-Architect-Erfahrung mit — Boost-Faktor bei jeder Bewerbung, sofern im
    Profil-Text sichtbar gemacht.

# ─── Hinweis zur Verwendung ─────────────────────────────────────────────────

hinweise:
  - >-
    Wenn eine Ausschreibung "Software Engineer" sagt aber faktisch Architektur-
    verantwortung erwartet (Stichworte: "verantwortet die technische Konzeption",
    "definiert die Schnittstellen"), wechselt der relevante Match-Ranking-Vergleich
    auf senior_architect.yaml.
  - >-
    Bei "Senior Software Engineer" als Titel: SFIA-Zielbereich verschiebt sich auf
    [4, 5] mit Schwerpunkt 5 — der Erfahrungsraum wächst über reine Implementierung
    hinaus.
