# Role Profile: Technischer Projektleiter
#
# Referenz-Kompetenzset für die Rolle "Technischer Projektleiter" — eine hybride
# Rolle zwischen Software-Engineering, Architektur und Projektkoordination.
# Im Unterschied zum Engineering Manager OHNE direkte Personalverantwortung —
# der Fokus liegt auf technischer Führung und Projekt-Lieferung.
#
# Verwendung in Advisory:
#   - Drittes relevantes Profil neben software_engineer und senior_architect
#   - Robert hat diese Rolle real ausgeübt (Vorstudie zur SOA-/Message-Queue-Umstellung
#     bei einer Bundesoberbehörde im Finanzaufsichtsbereich, 2019, Scrum-Kontext)
#
# Differenzierung:
#   - vs. Software Engineer: explizites Koordinations- und Entscheidungsmandat
#   - vs. Senior Architect: stärkerer Fokus auf Lieferung, weniger auf langfristige Vision
#   - vs. Engineering Manager: KEINE Personalverantwortung
#
# Quelle: handverlesen, Stufe 1.

role: Technischer Projektleiter
sfia_level: 5
sfia_target_range: [5, 6]

description: >-
  Verantwortet die technische Lieferung eines Projekts über mehrere Monate bis Quartale.
  Trifft technische Entscheidungen, koordiniert die Umsetzung mit Entwicklerteam und
  Fachseite, hält Termine und Scope gegenüber Stakeholdern. Bringt eigene technische
  Substanz ein, ist aber nicht reiner Entwickler.

expected_competencies:

  methodenkompetenz:
    erwartet:
      - Iteratives Projektmanagement (Scrum, Kanban, SAFe oder vergleichbar)
      - Architektur-Methoden (ARC42, ADR)
      - Risk Management und Risikokommunikation
      - Stakeholder-Mapping und -Kommunikation
      - Schätzungs- und Planungsverfahren (Story Points, Capacity Planning)
    wuenschenswert:
      - Klassisches Projektmanagement (PMBOK, PRINCE2) für regulierte Umgebungen
      - Lean Methods, Value Stream Mapping
      - Konfliktmoderation

  fachkompetenz:
    erwartet:
      - Tiefe in mindestens einer Domäne (Finanzwesen, Telco, Public Sector, ...)
      - Fähigkeit, fachliche Anforderungen in technische Roadmaps zu übersetzen
      - Verständnis regulatorischer Rahmenbedingungen der Zielbranche
    wuenschenswert:
      - Erfahrung mit Compliance-getriebenen Projekten (DORA, BAIT, MaRisk)

  technologie:
    erwartet:
      - Solide technische Grundlage (Senior-Engineer-Niveau in einer Tech-Familie)
      - Architektur-Verständnis (Microservices, SOA, Event-Driven)
      - REST APIs, Schnittstellen-Modellierung
      - Versionskontrolle (Git), CI/CD-Verständnis
    erwartet_eines_von:
      - [Java, "Spring/JEE-Stack"]
      - [".NET-Stack"]
      - ["Andere etablierte Enterprise-Stacks"]
    wuenschenswert:
      - Messaging (Kafka, JMS, RabbitMQ)
      - Container und Cloud-Plattformen

  spezialgebiet:
    optional_aber_differenzierend:
      - Erfahrung mit Migrationen und Modernisierungsprojekten
      - Modellgetriebene Entwicklung als Mittel zur Skalierung
      - Architektur-Dokumentation in regulierten Umgebungen
      - Schnittstellen-Design zwischen Bestand und Neuentwicklung
      - Prototyping-/Vorstudien-Phasen (Machbarkeit klären vor großer Umsetzung)

  fuehrungkompetenz:
    erwartet:
      - Fachliche Führung eines Entwicklerteams (ohne disziplinarische Verantwortung)
      - Verhandlungs- und Eskalationsfähigkeit
      - Statusberichte und Management-Kommunikation
      - Moderation technischer Diskussionen, Konsens-Findung
      - Code-Review-Qualität als Multiplikator
    wuenschenswert:
      - Übergreifende Koordination mehrerer Teams oder Schnittstellen-Partner
      - Mentoring von Senior-Entwicklern

# ─── Abgrenzung ──────────────────────────────────────────────────────────────

abgrenzung:
  - "Nicht: Engineering Manager (hat Personalverantwortung)"
  - "Nicht: Programm-/Portfolio-Manager (Ebene über einzelnen Projekten)"
  - "Nicht: Reiner Scrum Master (kein technisches Entscheidungsmandat)"
  - "Nicht: Senior Architect ohne Lieferverantwortung (Architektur ist Mittel, nicht Selbstzweck)"
  - >-
    Das Besondere: Vereint technische Substanz, Liefer-Disziplin und Stakeholder-
    Kommunikation — typischerweise schwer zu besetzen, weil reine Tech-Leute Lieferung
    oder Politik scheuen, und reine PM-Leute die technische Tiefe fehlt.

# ─── Hinweis zur Verwendung ─────────────────────────────────────────────────

hinweise:
  - >-
    Ausschreibungen mit Stichworten "technische Projektleitung", "technischer
    Projektmanager", "Tech Lead mit Liefer-Verantwortung", "Solution Lead" matchen
    primär gegen dieses Profil.
  - >-
    Bei Ausschreibungen die "Personalverantwortung" oder "Mitarbeiterführung"
    enthalten, wechselt das Match-Ranking auf ein (noch nicht existierendes)
    engineering_manager-Profil — diese Rolle ist eine bewusste Abgrenzung.
